services:
  - type: web
    name: labelhunter-server
    env: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NEXTIS_URL_API
        sync: false
      - key: NEXTIS_TOKEN_ADMIN
        sync: false
      - key: LP_BASE_URL
        value: https://lpapi.mroauto.eu
      - key: LP_CLIENT_ID
        sync: false
      - key: LP_CLIENT_SECRET
        sync: false
      - key: LP_SCOPE
        value: lp_api_full
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: info@mroauto.cz
      - key: SMTP_FROM_NAME
        value: "MROAUTO AUTODILY"
      - key: APP_URL
        sync: false

  - type: web
    name: labelhunter-client
    env: static
    region: frankfurt
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
